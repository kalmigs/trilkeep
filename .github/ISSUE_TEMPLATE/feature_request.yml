name: Feature Request
description: Suggest a feature or improvement for Trilkeep.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you have in mind. Concrete use cases help a lot.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What are you trying to do, and where does the current behavior fall short?
      placeholder: I want to do X, but currently I can't because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the behavior or feature you would like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches or workarounds you have tried.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or links that help explain the request.
    validations:
      required: false
